services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: applywise
      POSTGRES_USER: applywise
      POSTGRES_PASSWORD: applywise
    ports:
      - "5432:5432"
    volumes:
      - applywise-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applywise -d applywise"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  applywise-postgres-data:

